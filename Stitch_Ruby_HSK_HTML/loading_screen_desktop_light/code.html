<!-- Interaction & Logic Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const percentageText = document.getElementById('percentage');
            let progress = 0;

            // Simulate loading steps for aesthetic feel
            const updateLoading = () => {
                if (progress < 100) {
                    // Random increment to simulate real loading feel
                    const increment = Math.random() * 8;
                    progress = Math.min(progress + increment, 100);
                    
                    progressBar.style.width = `${progress}%`;
                    percentageText.innerText = `${Math.floor(progress)}%`;
                    
                    // Slightly varied intervals
                    setTimeout(updateLoading, 100 + Math.random() * 200);
                } else {
                    // Optional: Fade out or redirect after complete
                    setTimeout(() => {
                        console.log('Loading Complete');
                        // In a real app, this would trigger the transition to the dashboard
                    }, 500);
                }
            };

            // Start simulated progress
            setTimeout(updateLoading, 500);

            // Subtle interaction: Mascot follows mouse slightly
            const mascot = document.querySelector('.float-animation');
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                mascot.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateY(-15px) scale(1.05)`;
            });

            // Reset transform when mouse leaves or stops
            document.addEventListener('mouseleave', () => {
                mascot.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0px) scale(1)`;
            });
        });
    </script>
